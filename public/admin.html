<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mahjong — Admin</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap');
:root{--navy:#0d2b1e;--navy-light:#163d2b;--navy-mid:#1e5038;--gold:#c9a227;--gold-light:#e8c547;--cream:#f5ecd7;--cream-dark:#e8d8b8;--shadow:rgba(0,0,0,0.4);--radius:12px;--radius-sm:6px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy);color:var(--cream);font-family:'Lato',sans-serif;min-height:100vh;padding:24px}
.wrap{max-width:1100px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.title{font-family:'Cinzel',serif;font-size:clamp(20px,4vw,28px);font-weight:700;letter-spacing:3px;color:var(--gold)}
.title-sub{font-size:11px;letter-spacing:2px;color:rgba(245,236,215,.5);margin-top:2px}
.actions{display:flex;gap:10px}
.btn{background:var(--navy-mid);color:var(--cream);border:1px solid rgba(201,162,39,.3);padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:'Lato',sans-serif}
.btn:hover{background:var(--navy-light)}
.btn-back{text-decoration:none;display:inline-flex;align-items:center}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
.card{background:var(--navy-light);border:1px solid rgba(201,162,39,.2);border-radius:var(--radius);padding:18px;box-shadow:0 4px 16px var(--shadow)}
.card-value{font-family:'Cinzel',serif;font-size:30px;font-weight:700;color:var(--gold-light)}
.card-label{font-size:11px;letter-spacing:1.5px;color:rgba(245,236,215,.55);text-transform:uppercase;margin-top:6px}
.empty,.denied{padding:60px 20px;text-align:center;color:rgba(245,236,215,.5)}
.denied a{color:var(--gold)}

.frame{background:var(--navy-light);border:1px solid rgba(201,162,39,.2);border-radius:var(--radius);box-shadow:0 4px 16px var(--shadow);margin-top:24px;overflow:hidden}
.frame-title{font-family:'Cinzel',serif;font-size:15px;letter-spacing:2px;color:var(--gold);padding:16px 18px;border-bottom:1px solid rgba(201,162,39,.2)}
.users-table{width:100%;border-collapse:collapse;font-size:13px}
.users-table th{text-align:left;padding:10px 14px;color:rgba(245,236,215,.55);font-size:10px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid rgba(201,162,39,.15);white-space:nowrap}
.users-table td{padding:10px 14px;border-bottom:1px solid rgba(201,162,39,.08);vertical-align:top}
.users-table tr:last-child td{border-bottom:none}
.users-table tr:hover td{background:rgba(201,162,39,.05)}
.user-name{color:var(--cream);font-weight:700}
.user-email{color:rgba(245,236,215,.5);font-size:11px;margin-top:2px}
.pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;letter-spacing:.5px;text-transform:uppercase}
.pill-on{background:rgba(201,162,39,.25);color:var(--gold-light)}
.pill-off{background:rgba(245,236,215,.08);color:rgba(245,236,215,.4)}
.co-players{color:rgba(245,236,215,.6);font-size:12px;max-width:260px}
.frame-empty{padding:30px 18px;text-align:center;color:rgba(245,236,215,.4);font-size:13px}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="empty">Loading…</div>
</div>

<script>
async function main() {
  const app = document.getElementById('app');

  const meRes = await fetch('/api/me').catch(() => null);
  if (!meRes || !meRes.ok) {
    app.innerHTML = denied('You must be signed in to view this page.');
    return;
  }
  const me = await meRes.json();
  if (!me.isAdmin) {
    app.innerHTML = denied('This page is only available to the admin account.');
    return;
  }

  const [statsRes, usersRes] = await Promise.all([
    fetch('/api/admin/stats'),
    fetch('/api/admin/users'),
  ]);
  if (!statsRes.ok) {
    app.innerHTML = denied('Failed to load admin data.');
    return;
  }
  const stats = await statsRes.json();
  const users = usersRes.ok ? (await usersRes.json()).users : null;
  render(stats, users);
}

function denied(msg) {
  return `<div class="denied"><p>${msg}</p><p style="margin-top:12px"><a href="/">← Back to Mahjong</a></p></div>`;
}

function render(s, users) {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="header">
      <div>
        <div class="title">MAHJONG — ADMIN</div>
        <div class="title-sub">ANALYTICS DASHBOARD</div>
      </div>
      <div class="actions">
        <button class="btn" onclick="location.reload()">↻ Refresh</button>
        <a class="btn btn-back" href="/">← Back to game</a>
      </div>
    </div>

    <div class="cards">
      ${card(s.totalUsers, 'Registered Users')}
      ${card(s.newUsersLast7d, 'New Users (7d)')}
      ${card(s.totalGames, 'Total Games')}
      ${card(s.activeGames, 'Games In Progress')}
      ${card(s.gamesLast7d, 'Games Started (7d)')}
      ${card(s.avgGameDurationMinutes != null ? s.avgGameDurationMinutes + 'm' : '–', 'Avg Game Duration')}
    </div>

    <div class="frame">
      <div class="frame-title">REGISTERED USERS</div>
      ${users ? usersTable(users) : `<div class="frame-empty">Failed to load users.</div>`}
    </div>
  `;
}

function card(value, label) {
  return `<div class="card"><div class="card-value">${value}</div><div class="card-label">${label}</div></div>`;
}

function usersTable(users) {
  if (users.length === 0) return `<div class="frame-empty">No registered users yet.</div>`;
  const rows = users.map(u => `
    <tr>
      <td>
        <div class="user-name">${escapeHtml(u.name)}</div>
        <div class="user-email">${escapeHtml(u.email)}</div>
      </td>
      <td>${u.gamesPlayed}</td>
      <td>${u.wins}–${u.losses}</td>
      <td><span class="pill ${u.pushEnabled ? 'pill-on' : 'pill-off'}">${u.pushEnabled ? 'On' : 'Off'}</span></td>
      <td class="co-players">${u.coPlayers.length ? escapeHtml(u.coPlayers.join(', ')) : '–'}</td>
    </tr>
  `).join('');
  return `
    <table class="users-table">
      <thead>
        <tr><th>Player</th><th>Games</th><th>W–L</th><th>Push</th><th>Co-Players</th></tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str ?? '';
  return div.innerHTML;
}

main();
</script>
</body>
</html>
